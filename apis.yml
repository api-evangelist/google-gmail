apis:
  - name: Google Gmail API
    description: >-
      The Gmail API provides programmatic access to Gmail mailboxes. It supports
      typical mailbox operations like reading, composing, and sending messages,
      managing drafts, labels, threads, and configuring account settings
      including forwarding, filters, and delegates.
