aid: google-gmail
name: Google Gmail
description: >-
  The Gmail API lets you view and manage Gmail mailbox data like threads,
  messages, and labels. It provides RESTful access to Gmail mailboxes,
  supporting message sending, drafting, organizing with labels, managing
  settings, and push notifications for mailbox changes. The API uses OAuth 2.0
  for authorization and supports both user and service account authentication
  for Google Workspace domains.
